<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draggable Squares</title>
  <style>
    #container {
      width: 500px;
      height: 500px;
      border: 2px solid #000;
      position: relative;
    }
    .square {
      width: 50px;
      height: 50px;
      background-color: red;
      position: absolute;
      cursor: move;
    }
  </style>
</head>
<body>
<h1>Drag the squares</h1>
<div id="container">
  <div class="square" id="square1" style="top: 50px; left: 50px;"></div>
  <div class="square" id="square2" style="top: 150px; left: 150px;"></div>
</div>

<script>
    const squares = document.querySelectorAll('.square');
    const container = document.getElementById('container');

    squares.forEach(square => {
        square.addEventListener('mousedown', (e) => {
            let offsetX = e.clientX - square.getBoundingClientRect().left;
            let offsetY = e.clientY - square.getBoundingClientRect().top;

            const containerRect = container.getBoundingClientRect();

            const mouseMoveHandler = (moveEvent) => {
                const left = moveEvent.clientX - offsetX;
                const top = moveEvent.clientY - offsetY;

                // Prevent square from moving outside the container
                const maxLeft = containerRect.width - square.offsetWidth;
                const maxTop = containerRect.height - square.offsetHeight;

                square.style.left = `${Math.min(Math.max(left, containerRect.left), maxLeft + containerRect.left)}px`;
                square.style.top = `${Math.min(Math.max(top, containerRect.top), maxTop + containerRect.top)}px`;
            };

            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', () => {
                document.removeEventListener('mousemove', mouseMoveHandler);
            });
        });
    });
</script>
</body>
</html>
